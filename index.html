<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SteelHub — 환봉 재고 거래 플랫폼</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f0;color:#1a1a1a;min-height:100vh}
.header{background:#fff;border-bottom:1px solid #e5e5e0;padding:0 24px;position:sticky;top:0;z-index:100}
.header-inner{max-width:1100px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:60px}
.logo{display:flex;align-items:center;gap:8px;font-size:18px;font-weight:600;color:#1a1a1a;text-decoration:none}
.logo-icon{width:32px;height:32px;background:#1a1a1a;border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:16px}
.nav-btns{display:flex;gap:8px;align-items:center}
.btn{padding:7px 16px;border-radius:8px;font-size:13px;cursor:pointer;border:1px solid #e5e5e0;background:#fff;color:#1a1a1a;font-weight:500;transition:all .15s}
.btn:hover{background:#f5f5f0}
.btn-dark{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
.btn-dark:hover{background:#333}
.hero{background:#1a1a1a;color:#fff;padding:56px 24px;text-align:center}
.hero h1{font-size:36px;font-weight:700;margin-bottom:12px;letter-spacing:-0.5px}
.hero p{font-size:16px;color:#999;margin-bottom:32px}
.hero-btns{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.btn-white{padding:12px 24px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;background:#fff;color:#1a1a1a;border:none;transition:opacity .15s}
.btn-white:hover{opacity:.88}
.btn-outline-white{padding:12px 24px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;background:transparent;color:#fff;border:1px solid #444;transition:background .15s}
.btn-outline-white:hover{background:#222}
.stats{background:#fff;border-bottom:1px solid #e5e5e0;padding:16px 24px}
.stats-inner{max-width:1100px;margin:0 auto;display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
.stat{text-align:center}
.stat-val{font-size:22px;font-weight:700;color:#1a1a1a}
.stat-label{font-size:12px;color:#888;margin-top:2px}
.main{max-width:1100px;margin:0 auto;padding:24px}
.tabs{display:flex;gap:0;border-bottom:1px solid #e5e5e0;margin-bottom:20px}
.tab{padding:10px 20px;font-size:14px;cursor:pointer;border:none;background:none;border-bottom:2px solid transparent;color:#888;font-weight:500;transition:all .15s}
.tab.active{color:#1a1a1a;border-bottom-color:#1a1a1a}
.filters{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.search-wrap{position:relative;flex:1;min-width:180px}
.search-wrap i{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:#aaa;font-size:15px}
.search-input{width:100%;padding:8px 10px 8px 32px;border:1px solid #e5e5e0;border-radius:8px;font-size:13px;background:#fff;color:#1a1a1a}
.select{padding:8px 12px;border:1px solid #e5e5e0;border-radius:8px;font-size:13px;background:#fff;color:#1a1a1a;cursor:pointer}
.empty-state{text-align:center;padding:60px 24px;color:#aaa}
.empty-state i{font-size:48px;margin-bottom:16px;display:block}
.empty-state p{font-size:15px;margin-bottom:8px;color:#888}
.empty-state span{font-size:13px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px}
.card{background:#fff;border:1px solid #e5e5e0;border-radius:12px;padding:16px 18px;transition:border-color .15s}
.card:hover{border-color:#aaa}
.card-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.badge{padding:3px 10px;border-radius:6px;font-size:12px;font-weight:600}
.b-sus{background:#e8f0ff;color:#2563eb}
.b-carbon{background:#e8f8f0;color:#16a34a}
.b-struct{background:#fef3e2;color:#d97706}
.b-alloy{background:#f3e8ff;color:#7c3aed}
.urgent{background:#fff0ed;color:#dc2626;font-size:11px;padding:2px 8px;border-radius:6px;font-weight:600}
.card-title{font-size:15px;font-weight:600;color:#1a1a1a;margin-bottom:4px}
.card-meta{font-size:12px;color:#888;display:flex;gap:12px;margin-bottom:10px;flex-wrap:wrap}
.specs{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:12px}
.spec{background:#f5f5f0;border-radius:6px;padding:6px 10px}
.spec-label{font-size:10px;color:#aaa;text-transform:uppercase;letter-spacing:.4px}
.spec-val{font-size:13px;font-weight:600;color:#1a1a1a;margin-top:1px}
.card-footer{display:flex;align-items:center;justify-content:space-between;padding-top:10px;border-top:1px solid #f0f0ec}
.price{font-size:17px;font-weight:700;color:#1a1a1a}
.price span{font-size:12px;font-weight:400;color:#888}
.card-actions{display:flex;gap:6px}
.btn-sm{padding:5px 12px;font-size:12px;border-radius:6px;cursor:pointer;border:1px solid #e5e5e0;background:#fff;color:#1a1a1a;font-weight:500;transition:background .15s}
.btn-sm:hover{background:#f5f5f0}
.btn-contact{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
.btn-contact:hover{background:#333}
.panel{display:none}
.panel.active{display:block}
.login-required{background:#fff;border:1px solid #e5e5e0;border-radius:12px;padding:40px;text-align:center;max-width:440px}
.login-required i{font-size:40px;color:#aaa;margin-bottom:16px;display:block}
.login-required h3{font-size:17px;font-weight:600;margin-bottom:8px}
.login-required p{font-size:13px;color:#888;margin-bottom:20px;line-height:1.6}
.form-box{background:#fff;border:1px solid #e5e5e0;border-radius:12px;padding:24px;max-width:600px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.form-full{grid-column:1/-1}
.form-label{font-size:12px;color:#666;margin-bottom:5px;display:block;font-weight:500}
.form-input{width:100%;padding:9px 12px;border:1px solid #e5e5e0;border-radius:8px;font-size:13px;color:#1a1a1a;background:#fff}
.form-input:focus{outline:none;border-color:#1a1a1a}
.success{display:none;padding:10px 14px;background:#e8f8f0;border-radius:8px;font-size:13px;color:#16a34a;margin-bottom:14px;align-items:center;gap:8px}
.success.show{display:flex}
.modal-bg{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:200;align-items:center;justify-content:center}
.modal-bg.open{display:flex}
.modal{background:#fff;border-radius:14px;padding:24px;width:420px;max-width:92vw;max-height:90vh;overflow-y:auto}
.modal-title{font-size:16px;font-weight:700;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center}
.modal-close{background:none;border:none;cursor:pointer;font-size:20px;color:#888;line-height:1}
.modal-item{background:#f5f5f0;border-radius:8px;padding:10px 14px;margin-bottom:16px;font-size:13px;color:#666}
.modal-footer{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}
.auth-tabs{display:flex;gap:0;border-bottom:1px solid #e5e5e0;margin-bottom:20px}
.auth-tab{flex:1;padding:10px;font-size:14px;cursor:pointer;border:none;background:none;border-bottom:2px solid transparent;color:#888;font-weight:500}
.auth-tab.active{color:#1a1a1a;border-bottom-color:#1a1a1a}
.auth-panel{display:none}
.auth-panel.active{display:block}
.user-info{display:flex;align-items:center;gap:8px;font-size:13px;color:#1a1a1a}
.user-avatar{width:28px;height:28px;border-radius:50%;background:#1a1a1a;color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600}
footer{background:#1a1a1a;color:#888;text-align:center;padding:24px;font-size:13px;margin-top:40px}
@media(max-width:600px){.hero h1{font-size:26px}.stats-inner{grid-template-columns:repeat(2,1fr)}.form-grid{grid-template-columns:1fr}}
</style>
</head>
<body>

<header class="header">
  <div class="header-inner">
    <a class="logo" href="#">
      <div class="logo-icon"><i class="ti ti-cut"></i></div>
      SteelHub
    </a>
    <div class="nav-btns" id="navBtns">
      <button class="btn" onclick="openAuthModal('login')">로그인</button>
      <button class="btn btn-dark" onclick="openAuthModal('signup')">회원가입</button>
    </div>
  </div>
</header>

<section class="hero">
  <h1>환봉 악성재고,<br>빠르게 연결합니다</h1>
  <p>STS · 탄소강 · 구조용강 전문 B2B 환봉 거래 플랫폼</p>
  <div class="hero-btns">
    <button class="btn-white" onclick="showTab('market')">재고 둘러보기</button>
    <button class="btn-outline-white" onclick="requireLogin()">내 재고 등록하기</button>
  </div>
</section>

<section class="stats">
  <div class="stats-inner">
    <div class="stat"><div class="stat-val" id="statTotal">0</div><div class="stat-label">등록 재고</div></div>
    <div class="stat"><div class="stat-val" id="statSus">0</div><div class="stat-label">스테인리스</div></div>
    <div class="stat"><div class="stat-val" id="statCarbon">0</div><div class="stat-label">탄소강</div></div>
    <div class="stat"><div class="stat-val" id="statUrgent" style="color:#dc2626">0</div><div class="stat-label">긴급 처분</div></div>
  </div>
</section>

<main class="main">
  <div class="tabs">
    <button class="tab active" id="tab-market" onclick="showTab('market')">재고 시장</button>
    <button class="tab" id="tab-request" onclick="showTab('request')">구매 요청</button>
    <button class="tab" id="tab-post" onclick="showTab('post')">재고 등록</button>
  </div>

  <div id="panel-market" class="panel active">
    <div class="filters">
      <div class="search-wrap">
        <i class="ti ti-search"></i>
        <input class="search-input" type="text" placeholder="규격, 재질, 지역 검색..." id="searchInput" oninput="filterCards()">
      </div>
      <select class="select" id="gradeFilter" onchange="filterCards()">
        <option value="">전체 재질</option>
        <optgroup label="스테인리스">
          <option value="SUS304">SUS304</option>
          <option value="SUS303">SUS303</option>
          <option value="SUS316">SUS316</option>
        </optgroup>
        <optgroup label="탄소강">
          <option value="S45C">S45C</option>
          <option value="S20C">S20C</option>
        </optgroup>
        <optgroup label="구조용강·배관">
          <option value="SS400">SS400</option>
          <option value="A105">A105</option>
        </optgroup>
      </select>
      <select class="select" id="urgentFilter" onchange="filterCards()">
        <option value="">전체</option>
        <option value="urgent">긴급 처분</option>
      </select>
      <select class="select" id="sortFilter" onchange="filterCards()">
        <option value="newest">최신순</option>
        <option value="price">가격 낮은순</option>
        <option value="qty">수량 많은순</option>
      </select>
    </div>
    <p style="font-size:13px;color:#888;margin-bottom:14px" id="result-count"></p>
    <div id="cardGrid"></div>
  </div>

  <div id="panel-request" class="panel">
    <div class="form-box">
      <div class="success" id="req-success"><i class="ti ti-check"></i> 구매 요청이 등록되었습니다.</div>
      <div class="form-grid">
        <div><label class="form-label">재질</label>
          <select class="form-input" id="req-grade">
            <optgroup label="스테인리스"><option>SUS304</option><option>SUS303</option><option>SUS316</option></optgroup>
            <optgroup label="탄소강"><option>S45C</option><option>S20C</option></optgroup>
            <optgroup label="구조용강·배관"><option>SS400</option><option>A105</option></optgroup>
          </select>
        </div>
        <div><label class="form-label">규격</label><input class="form-input" type="text" id="re
